<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="100%" height="100%">
  <!-- Connecting Lines -->
  <g stroke="#4a4a5a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Hexagon -->
    <line x1="75" y1="50" x2="135" y2="55" />
    <line x1="135" y1="55" x2="165" y2="85" />
    <line x1="165" y1="85" x2="140" y2="130" />
    <line x1="140" y1="130" x2="80" y2="140" />
    <line x1="80" y1="140" x2="45" y2="100" />
    <line x1="45" y1="100" x2="75" y2="50" />

    <!-- Inner Spokes -->
    <line x1="105" y1="95" x2="75" y2="50" />
    <line x1="105" y1="95" x2="135" y2="55" />
    <line x1="105" y1="95" x2="165" y2="85" />
    <line x1="105" y1="95" x2="140" y2="130" />
    <line x1="105" y1="95" x2="80" y2="140" />
    <line x1="105" y1="95" x2="45" y2="100" />
  </g>

  <!-- Network Nodes (Rings) -->
  <g fill="#ffffff" stroke-width="3.5">
    <!-- Top Left: Purple -->
    <ellipse cx="75" cy="50" rx="19" ry="11" transform="rotate(-18 75 50)" stroke="#8e549e" />
    
    <!-- Top Right: Blue -->
    <ellipse cx="135" cy="55" rx="17" ry="10" transform="rotate(12 135 55)" stroke="#4b61b8" />
    
    <!-- Far Right: Purple -->
    <ellipse cx="165" cy="85" rx="16" ry="9" transform="rotate(25 165 85)" stroke="#8e549e" />
    
    <!-- Bottom Right: Red -->
    <ellipse cx="140" cy="130" rx="19" ry="11" transform="rotate(-15 140 130)" stroke="#c44d4d" />
    
    <!-- Bottom Left: Black (Largest) -->
    <ellipse cx="80" cy="140" rx="26" ry="18" transform="rotate(-8 80 140)" stroke="#2c2c2c" />
    
    <!-- Far Left: Red -->
    <ellipse cx="45" cy="100" rx="18" ry="10" transform="rotate(22 45 100)" stroke="#c44d4d" />
    
    <!-- Center: Blue -->
    <ellipse cx="105" cy="95" rx="23" ry="14" transform="rotate(8 105 95)" stroke="#4b61b8" />
  </g>
</svg>
